name: "Bug Report"
description: "Report a reproducible bug in Harnex."
title: "[Bug] <short description>"
labels: ["bug"]
body:
  - type: input
    id: connector
    attributes:
      label: "Affected connector (if applicable)"
      description: "The connector key, e.g. github, linear, generic. Leave blank for non-connector bugs."
      placeholder: "github"

  - type: textarea
    id: description
    attributes:
      label: "What happened?"
      description: "Include the full error message, JSON-RPC error body, or stack trace."
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: "What did you expect to happen?"
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: "Steps to reproduce"
      placeholder: |
        1. POST /v1/connections with body { "connector_key": "github", ... }
        2. Call MCP execute tool with ...
        3. See error ...
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: "Harnex version / commit"
      placeholder: "0.2.0 / abc1234 (check VERSION file or git log)"

  - type: dropdown
    id: env
    attributes:
      label: "Environment"
      options:
        - "Docker compose (local)"
        - "Local uvicorn (no Docker)"
        - "Self-hosted production"
        - "Other"
