name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-prod
  cancel-in-progress: false

permissions:
  # Required for OIDC federation with Azure (no static creds).
  id-token: write
  contents: read

jobs:
  build-and-push:
    name: Build & push images to ACR
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.tag.outputs.value }}
    steps:
      - uses: actions/checkout@v4

      - id: tag
        # Short SHA is unique enough and easy to correlate with git.
        run: echo "value=${GITHUB_SHA::12}" >>"$GITHUB_OUTPUT"

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: ACR login
        run: az acr login --name "${{ secrets.ACR_NAME }}"

      - uses: docker/setup-buildx-action@v3

      - name: Build & push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ secrets.ACR_LOGIN_SERVER }}/harnex-api:${{ steps.tag.outputs.value }}
            ${{ secrets.ACR_LOGIN_SERVER }}/harnex-api:latest
          cache-from: type=registry,ref=${{ secrets.ACR_LOGIN_SERVER }}/harnex-api:buildcache
          cache-to: type=registry,ref=${{ secrets.ACR_LOGIN_SERVER }}/harnex-api:buildcache,mode=max

      - name: Build & push web image
        uses: docker/build-push-action@v6
        with:
          context: ./web
          file: web/Dockerfile
          push: true
          # The VITE_* values get baked into the SPA bundle at build time, so
          # changing the public hostname requires a redeploy. Same-origin in prod →
          # API URL is just the public host. (Keycloak URLs are no longer required —
          # the BFF handles OIDC server-side.)
          build-args: |
            VITE_HARNEX_API_URL=https://${{ secrets.HARNEX_PUBLIC_HOST }}
          tags: |
            ${{ secrets.ACR_LOGIN_SERVER }}/harnex-web:${{ steps.tag.outputs.value }}
            ${{ secrets.ACR_LOGIN_SERVER }}/harnex-web:latest
          cache-from: type=registry,ref=${{ secrets.ACR_LOGIN_SERVER }}/harnex-web:buildcache
          cache-to: type=registry,ref=${{ secrets.ACR_LOGIN_SERVER }}/harnex-web:buildcache,mode=max

  deploy:
    name: Deploy to VM
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Pull updated repo + run deploy.sh
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VM_SSH_HOST }}
          username: ${{ secrets.VM_SSH_USER }}
          key: ${{ secrets.VM_SSH_PRIVATE_KEY }}
          script: |
            set -euo pipefail
            cd /opt/harnex
            # Refresh the repo so docker-compose.prod.yml / scripts stay in sync with main.
            git fetch --quiet origin main
            git checkout --quiet ${{ github.sha }}
            bash scripts/deploy.sh ${{ needs.build-and-push.outputs.image_tag }}

      - name: Smoke-check /healthz
        run: |
          for i in {1..20}; do
            if curl -fsS "https://${{ secrets.HARNEX_PUBLIC_HOST }}/healthz" >/dev/null; then
              echo "healthz OK"
              exit 0
            fi
            echo "attempt $i — waiting for healthz…"
            sleep 5
          done
          echo "healthz never came up" >&2
          exit 1
