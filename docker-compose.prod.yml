# Production override. Layer on top of docker-compose.yml:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Differences vs the base compose:
#   - api/web come from Azure Container Registry (no `build:` in prod)
#   - Only Caddy publishes ports — everything else is internal to the docker network
#   - Persistent volumes live on the attached data disk at /data, not in named volumes
#   - HARNEX_ENV=prod + Keycloak's hostname/proxy hardening turned on

services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    environment:
      HARNEX_PUBLIC_HOST: ${HARNEX_PUBLIC_HOST:?set HARNEX_PUBLIC_HOST (e.g. harnex-app.eastus2.cloudapp.azure.com)}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - /data/caddy:/data
      - /data/caddy-config:/config
    depends_on:
      - web
      - api
      - keycloak

  postgres:
    ports: !reset []
    volumes: !override
      - /data/postgres:/var/lib/postgresql/data

  keycloak-db:
    volumes: !override
      - /data/keycloak-db:/var/lib/postgresql/data

  keycloak:
    # `start` (not `start-dev`) enforces production guardrails. First boot auto-builds
    # the optimized server jar — adds ~30s. To trim that, bake `RUN kc.sh build` into a
    # downstream Keycloak image and switch to `start --optimized`.
    command: ["start", "--import-realm"]
    environment:
      KC_HOSTNAME: ${HARNEX_PUBLIC_HOST:?}
      KC_HTTP_RELATIVE_PATH: /auth
      # Keycloak 25 deprecated KC_PROXY in favor of KC_PROXY_HEADERS. `xforwarded`
      # tells Keycloak to honor X-Forwarded-Proto/-For/-Host from Caddy.
      KC_PROXY_HEADERS: xforwarded
      KC_HOSTNAME_STRICT: "true"
      KC_HOSTNAME_STRICT_HTTPS: "true"
      KC_HTTP_ENABLED: "true"
      KC_HEALTH_ENABLED: "true"
    ports: !reset []

  # Self-host Infisical is intentionally disabled in prod — we use Infisical Cloud
  # (https://app.infisical.com). Parking these under a `self-host` profile keeps the
  # base compose valid without spinning up containers that we won't use.
  infisical-db:
    profiles: ["self-host"]
    volumes: !override
      - /data/infisical-db:/var/lib/postgresql/data

  infisical-redis:
    profiles: ["self-host"]

  infisical:
    profiles: ["self-host"]
    environment:
      SITE_URL: http://infisical:8080
    ports: !reset []

  api:
    build: !reset null
    image: ${ACR_LOGIN_SERVER:?}/harnex-api:${IMAGE_TAG:-latest}
    depends_on: !override
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      keycloak:
        condition: service_started
    environment:
      HARNEX_ENV: prod
      # Override the names the API actually reads. The base compose interpolates
      # these from KEYCLOAK_INTERNAL_BASE_URL / KEYCLOAK_PUBLIC_BASE_URL at parse
      # time — that happens before the prod override is layered, so setting the
      # `_INTERNAL_` / `_PUBLIC_` aliases here would NOT change the values that
      # land in the container. Set the canonical names instead.
      KEYCLOAK_BASE_URL: http://keycloak:8080/auth
      KEYCLOAK_ISSUER_BASE_URL: https://${HARNEX_PUBLIC_HOST:?}/auth
      INFISICAL_BASE_URL: ${INFISICAL_BASE_URL:-https://app.infisical.com}
      # Allowlisted by the MCP transport-security middleware so the streamable-HTTP
      # endpoint accepts the public hostname (without it: "Invalid Host header").
      HARNEX_PUBLIC_HOST: ${HARNEX_PUBLIC_HOST:?}
    command:
      - uvicorn
      - harnex_api.main:app
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --proxy-headers
      - --forwarded-allow-ips=*
    ports: !reset []

  web:
    build: !reset null
    image: ${ACR_LOGIN_SERVER:?}/harnex-web:${IMAGE_TAG:-latest}
    ports: !reset []
