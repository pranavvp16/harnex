<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Harnex — Welcome</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Newsreader:ital,opsz,wght@1,6..72,400;1,6..72,500&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="styles/tokens.css"/>
<link rel="stylesheet" href="styles/onboarding.css"/>
<style>
  html, body, #root { height: 100%; }
  body { overflow: hidden; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="components/icons.jsx"></script>
<script type="text/babel" src="components/logos.jsx"></script>
<script type="text/babel" src="components/onboarding-canvas.jsx"></script>
<script type="text/babel" src="components/onboarding.jsx"></script>

<script type="text/babel">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accent": "#F97316",
  "startStep": 0
}/*EDITMODE-END*/;

const accentSwatches = [
  { v: "#F97316", n: "Orange" },
  { v: "#EA580C", n: "Burnt" },
  { v: "#FF6A1F", n: "Vivid" },
  { v: "#D97757", n: "Clay" },
];

function App() {
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);

  React.useEffect(() => {
    document.documentElement.style.setProperty("--accent", tweaks.accent);
  }, [tweaks.accent]);

  return (
    <>
      <OnboardingPage key={tweaks.startStep} initialStep={tweaks.startStep ?? 0} tweaks={tweaks} setTweak={setTweak}/>

      <TweaksPanel title="Tweaks">
        <TweakSection title="Accent color">
          <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 6 }}>
            {accentSwatches.map(s => (
              <button key={s.v} onClick={() => setTweak("accent", s.v)} title={s.n} style={{ height: 32, borderRadius: 6, background: s.v, border: tweaks.accent === s.v ? "2px solid var(--ink)" : "1px solid var(--border)", cursor: "pointer" }}/>
            ))}
          </div>
        </TweakSection>
        <TweakSection title="Jump to step">
          <TweakSelect
            value={String(tweaks.startStep ?? 0)}
            onChange={v => setTweak("startStep", Number(v))}
            options={[
              { value: "0", label: "0 — Sign in" },
              { value: "1", label: "1 — Profile" },
              { value: "2", label: "2 — Workspace" },
              { value: "3", label: "3 — Connection" },
              { value: "4", label: "4 — Done" },
            ]}
          />
        </TweakSection>
      </TweaksPanel>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
