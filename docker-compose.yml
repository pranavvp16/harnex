# Copy .env.example to .env and set secrets locally. Compose substitutes ${VAR} from .env
# (or your shell); .env must not be committed.

services:
  postgres:
    restart: unless-stopped
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-harnex}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-harnex}
    ports:
      - "5432:5432"
    volumes:
      - harnex_postgres:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-harnex} -d ${POSTGRES_DB:-harnex}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10

  keycloak-db:
    restart: unless-stopped
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${KEYCLOAK_DB_USER:-keycloak}
      POSTGRES_PASSWORD: ${KEYCLOAK_DB_PASSWORD:?set KEYCLOAK_DB_PASSWORD in .env}
      POSTGRES_DB: ${KEYCLOAK_DB_NAME:-keycloak}
    volumes:
      - harnex_keycloak_db:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${KEYCLOAK_DB_USER:-keycloak} -d ${KEYCLOAK_DB_NAME:-keycloak}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10

  keycloak:
    restart: unless-stopped
    image: quay.io/keycloak/keycloak:25.0
    command: start-dev --import-realm
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/${KEYCLOAK_DB_NAME:-keycloak}
      KC_DB_USERNAME: ${KEYCLOAK_DB_USER:-keycloak}
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD:?set KEYCLOAK_DB_PASSWORD in .env}
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:?set KEYCLOAK_ADMIN_PASSWORD in .env}
      KC_HEALTH_ENABLED: "true"
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
    volumes:
      - ./infra/keycloak/import:/opt/keycloak/data/import:ro
    ports:
      - "8080:8080"
    depends_on:
      keycloak-db:
        condition: service_healthy

  infisical-db:
    restart: unless-stopped
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${INFISICAL_POSTGRES_USER:-infisical}
      POSTGRES_PASSWORD: ${INFISICAL_POSTGRES_PASSWORD:?set INFISICAL_POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${INFISICAL_POSTGRES_DB:-infisical}
    volumes:
      - harnex_infisical_db:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${INFISICAL_POSTGRES_USER:-infisical} -d ${INFISICAL_POSTGRES_DB:-infisical}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10

  infisical-redis:
    restart: unless-stopped
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  infisical:
    restart: unless-stopped
    image: infisical/infisical:latest
    environment:
      ENCRYPTION_KEY: ${INFISICAL_ENCRYPTION_KEY:?set INFISICAL_ENCRYPTION_KEY in .env}
      AUTH_SECRET: ${INFISICAL_AUTH_SECRET:?set INFISICAL_AUTH_SECRET in .env}
      DB_CONNECTION_URI: postgres://${INFISICAL_POSTGRES_USER:-infisical}:${INFISICAL_POSTGRES_PASSWORD}@infisical-db:5432/${INFISICAL_POSTGRES_DB:-infisical}
      REDIS_URL: redis://infisical-redis:6379
      SITE_URL: ${INFISICAL_SITE_URL:-http://localhost:8090}
      SMTP_HOST: ${INFISICAL_SMTP_HOST:-}
      SMTP_USERNAME: ${INFISICAL_SMTP_USERNAME:-}
      SMTP_PASSWORD: ${INFISICAL_SMTP_PASSWORD:-}
      SMTP_FROM_ADDRESS: ${INFISICAL_SMTP_FROM_ADDRESS:-noreply@localhost}
    ports:
      - "8090:8080"
    depends_on:
      infisical-db:
        condition: service_healthy
      infisical-redis:
        condition: service_healthy

  redis:
    restart: unless-stopped
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    restart: unless-stopped
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      HARNEX_ENV: ${HARNEX_ENV:-dev}
      HARNEX_LOG_LEVEL: ${HARNEX_LOG_LEVEL:-INFO}
      # docker-entrypoint.sh assembles DATABASE_URL from POSTGRES_* with URL-encoded
      # password. Don't pass through the host's DATABASE_URL — the .env value targets
      # localhost for non-docker runs and would leak into the container.
      POSTGRES_HOST: postgres
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      POSTGRES_USER: ${POSTGRES_USER:-harnex}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-harnex}
      KEYCLOAK_BASE_URL: ${KEYCLOAK_INTERNAL_BASE_URL:-http://keycloak:8080}
      # Public issuer URL — must match what end-users hit (the SPA goes via the
      # host-published port at http://localhost:8080), so tokens carry that as `iss`.
      KEYCLOAK_ISSUER_BASE_URL: ${KEYCLOAK_PUBLIC_BASE_URL:-http://localhost:8080}
      KEYCLOAK_REALM: ${KEYCLOAK_REALM:-harnex}
      KEYCLOAK_AUDIENCE: ${KEYCLOAK_AUDIENCE:-harnex-api}
      KEYCLOAK_JWKS_CACHE_SECONDS: ${KEYCLOAK_JWKS_CACHE_SECONDS:-300}
      KEYCLOAK_ADMIN_CLIENT_ID: ${KEYCLOAK_ADMIN_CLIENT_ID:-harnex-admin-cli}
      KEYCLOAK_ADMIN_CLIENT_SECRET: ${KEYCLOAK_ADMIN_CLIENT_SECRET:-}
      INFISICAL_BASE_URL: ${INFISICAL_INTERNAL_BASE_URL:-http://infisical:8080}
      INFISICAL_PROJECT_ID: ${INFISICAL_PROJECT_ID:-}
      INFISICAL_ENVIRONMENT: ${INFISICAL_ENVIRONMENT:-dev}
      INFISICAL_CLIENT_ID: ${INFISICAL_CLIENT_ID:-}
      INFISICAL_CLIENT_SECRET: ${INFISICAL_CLIENT_SECRET:-}
      HARNEX_REDIS_URL: ${HARNEX_REDIS_URL:-redis://redis:6379/0}
      # OpenAI embeddings — set HARNEX_OPENAI_API_KEY in .env. Empty key falls back
      # to the deterministic fake provider (dev/test only — search relevance is poor).
      HARNEX_OPENAI_API_KEY: ${HARNEX_OPENAI_API_KEY:-}
      HARNEX_OPENAI_EMBEDDING_MODEL: ${HARNEX_OPENAI_EMBEDDING_MODEL:-text-embedding-3-large}
      HARNEX_OPENAI_EMBEDDING_DIM: ${HARNEX_OPENAI_EMBEDDING_DIM:-1536}
      HARNEX_USE_FAKE_EMBEDDINGS: ${HARNEX_USE_FAKE_EMBEDDINGS:-0}
      # Blaxel sandbox (code-mode execute path). Empty BLAXEL_API_KEY disables
      # code-mode at runtime — /v1/execute with mode="code" will surface a clear
      # error instead of crashing.
      BLAXEL_API_KEY: ${BLAXEL_API_KEY:-}
      BLAXEL_BASE_URL: ${BLAXEL_BASE_URL:-}
      BLAXEL_WORKSPACE_URL: ${BLAXEL_WORKSPACE_URL:-}
      BLAXEL_WORKSPACE: ${BLAXEL_WORKSPACE:-}
      BLAXEL_SANDBOX_NAME: ${BLAXEL_SANDBOX_NAME:-harnex-execute}
      BLAXEL_SANDBOX_IMAGE: ${BLAXEL_SANDBOX_IMAGE:-blaxel/node:latest}
      BLAXEL_SANDBOX_REGION: ${BLAXEL_SANDBOX_REGION:-us-pdx-1}
      BLAXEL_SANDBOX_MEMORY_MB: ${BLAXEL_SANDBOX_MEMORY_MB:-2048}
      BLAXEL_DEFAULT_TIMEOUT_SECONDS: ${BLAXEL_DEFAULT_TIMEOUT_SECONDS:-30}
      BLAXEL_PYTHON_SANDBOX_NAME: ${BLAXEL_PYTHON_SANDBOX_NAME:-harnex-execute-py}
      BLAXEL_PYTHON_SANDBOX_IMAGE: ${BLAXEL_PYTHON_SANDBOX_IMAGE:-blaxel/py-app:latest}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 90s

  web:
    restart: unless-stopped
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        VITE_HARNEX_API_URL: ${VITE_HARNEX_API_URL:-http://localhost:8000}
        VITE_KEYCLOAK_AUTHORITY: ${VITE_KEYCLOAK_AUTHORITY:-http://localhost:8080/realms/harnex}
        VITE_KEYCLOAK_CLIENT_ID: ${VITE_KEYCLOAK_CLIENT_ID:-harnex-web}
        VITE_KEYCLOAK_REDIRECT_URI: ${VITE_KEYCLOAK_REDIRECT_URI:-http://localhost:5173/}
        VITE_KEYCLOAK_POST_LOGOUT_REDIRECT_URI: ${VITE_KEYCLOAK_POST_LOGOUT_REDIRECT_URI:-http://localhost:5173/}
        VITE_HARNEX_DEV_TENANT: ${VITE_HARNEX_DEV_TENANT:-}
    ports:
      - "5173:80"
    depends_on:
      api:
        condition: service_healthy

volumes:
  harnex_postgres:
  harnex_keycloak_db:
  harnex_infisical_db:
